<svg width="1200" height="750" viewBox="0 0 1200 750" fill="none" xmlns="http://www.w3.org/2000/svg" role="img"
  aria-label="THIENPER fullstack developer banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="750" gradientUnits="userSpaceOnUse">
      <stop stop-color="#051427" />
      <stop offset="0.55" stop-color="#07203A" />
      <stop offset="1" stop-color="#0A1422" />
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(190 110) rotate(24) scale(500 240)">
      <stop stop-color="#2AD8FF" stop-opacity="0.6" />
      <stop offset="1" stop-color="#2AD8FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(1030 610) rotate(180) scale(450 240)">
      <stop stop-color="#49F7A3" stop-opacity="0.38" />
      <stop offset="1" stop-color="#49F7A3" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="title" x1="118" y1="228" x2="700" y2="282" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9EF6FF" />
      <stop offset="0.5" stop-color="#5FE3FF" />
      <stop offset="1" stop-color="#89FFD8" />
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.22" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="30" />
    </filter>
    <filter id="shadow" x="0" y="0" width="1200" height="750" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020A14" flood-opacity="0.7" />
    </filter>
    <filter id="titleGlow" x="0" y="0" width="1200" height="750" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#47E6FF" flood-opacity="0.4" />
    </filter>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)" />

  <g>
    <rect width="1200" height="750" fill="url(#glowA)">
      <animate attributeName="opacity" values="0.72;0.5;0.72" dur="6s" repeatCount="indefinite" />
    </rect>
    <rect width="1200" height="750" fill="url(#glowB)">
      <animate attributeName="opacity" values="0.5;0.75;0.5" dur="6.5s" repeatCount="indefinite" />
    </rect>
  </g>

  <g opacity="0.12" stroke="#78DDFF" stroke-width="1">
    <path d="M38 672L460 250" />
    <path d="M124 714L544 294" />
    <path d="M746 126L1162 542" />
    <path d="M638 66L1048 476" />
  </g>

  <circle cx="212" cy="138" r="72" fill="#2EE3FF" opacity="0.22" filter="url(#blur)">
    <animate attributeName="r" values="64;76;64" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="1010" cy="602" r="88" fill="#3BFFB9" opacity="0.16" filter="url(#blur)">
    <animate attributeName="opacity" values="0.12;0.24;0.12" dur="5.5s" repeatCount="indefinite" />
  </circle>

  <g filter="url(#shadow)">
    <rect x="62" y="92" width="1076" height="566" rx="34" fill="#061A2D" fill-opacity="0.68" stroke="#5CDEFF"
      stroke-opacity="0.25" />
  </g>

  <g clip-path="url(#clipMain)">
    <rect x="-260" y="92" width="260" height="566" fill="url(#shine)" transform="skewX(-20)">
      <animate attributeName="x" values="-280;1280" dur="3.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <defs>
    <clipPath id="clipMain">
      <rect x="62" y="92" width="1076" height="566" rx="34" />
    </clipPath>
  </defs>

  <rect x="102" y="144" width="8" height="424" rx="4" fill="#44FFCD" opacity="0.9">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" repeatCount="indefinite" />
  </rect>

  <text x="132" y="206" fill="#90E2F7" font-family="Segoe UI, Verdana, sans-serif" font-size="24"
    letter-spacing="6">HELLO, I AM</text>

  <g filter="url(#titleGlow)">
    <text x="132" y="312" fill="url(#title)" font-family="Trebuchet MS, Segoe UI, Verdana, sans-serif" font-size="102"
      font-weight="700" letter-spacing="2">THIENPER</text>
  </g>

  <text x="132" y="372" fill="#D4FAFF" font-family="Segoe UI, Verdana, sans-serif" font-size="42" font-weight="700"
    letter-spacing="1">FULLSTACK DEVELOPER</text>
  <text x="132" y="432" fill="#9BCBDD" font-family="Segoe UI, Verdana, sans-serif" font-size="25">Node.js - Next.js -
    React - HTML - CSS - Spring Boot</text>

  <g>
    <rect x="132" y="482" width="314" height="58" rx="29" fill="#24DFFF" fill-opacity="0.14" stroke="#73EDFF" />
    <text x="283" y="515" fill="#D8FCFF" font-family="Segoe UI, Verdana, sans-serif" font-size="24" font-weight="700"
      letter-spacing="1" text-anchor="middle" dominant-baseline="middle">FULLSTACK READY</text>
  </g>

  <g opacity="0.95">
    <g>
      <rect x="822" y="156" width="270" height="58" rx="16" fill="#071426" stroke="#74E9FF" stroke-opacity="0.62" />
      <text x="957" y="185" fill="#CBF8FF" font-family="Segoe UI, Verdana, sans-serif" font-size="24" font-weight="600"
        text-anchor="middle" dominant-baseline="middle">Node.js</text>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.8s" begin="0s" repeatCount="indefinite" />
    </g>
    <g>
      <rect x="822" y="232" width="270" height="58" rx="16" fill="#071426" stroke="#7BFFE6" stroke-opacity="0.62" />
      <text x="957" y="261" fill="#D9FFF3" font-family="Segoe UI, Verdana, sans-serif" font-size="24" font-weight="600"
        text-anchor="middle" dominant-baseline="middle">Next.js</text>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.8s" begin="0.35s" repeatCount="indefinite" />
    </g>
    <g>
      <rect x="822" y="308" width="270" height="58" rx="16" fill="#071426" stroke="#7DE0FF" stroke-opacity="0.62" />
      <text x="957" y="337" fill="#D8F8FF" font-family="Segoe UI, Verdana, sans-serif" font-size="24" font-weight="600"
        text-anchor="middle" dominant-baseline="middle">React</text>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.8s" begin="0.7s" repeatCount="indefinite" />
    </g>
    <g>
      <rect x="822" y="384" width="270" height="58" rx="16" fill="#071426" stroke="#8FFFD9" stroke-opacity="0.62" />
      <text x="957" y="413" fill="#E0FFF5" font-family="Segoe UI, Verdana, sans-serif" font-size="24" font-weight="600"
        text-anchor="middle" dominant-baseline="middle">HTML - CSS</text>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.8s" begin="1.05s" repeatCount="indefinite" />
    </g>
    <g>
      <rect x="822" y="460" width="270" height="58" rx="16" fill="#071426" stroke="#89E8FF" stroke-opacity="0.62" />
      <text x="957" y="489" fill="#DBF9FF" font-family="Segoe UI, Verdana, sans-serif" font-size="24" font-weight="600"
        text-anchor="middle" dominant-baseline="middle">Spring Boot</text>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.8s" begin="1.4s" repeatCount="indefinite" />
    </g>
  </g>

  <text x="132" y="610" fill="#76AEBF" font-family="Segoe UI, Verdana, sans-serif" font-size="20"
    letter-spacing="3">THIENPER - FULLSTACK ENGINEER</text>
</svg>